name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: devsecops-demo

jobs:

  # ─── STAGE 1 : Tests & Coverage ───────────────────────────────────────────
  test:
    name: "Stage 1 · Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ─── STAGE 2 : SAST — Static Analysis ─────────────────────────────────────
  sast:
    name: "Stage 2 · SAST (Bandit + Semgrep)"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit SAST scan
        run: |
          bandit -r backend/app/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium || true
          bandit -r backend/app/ \
            --severity-level high \
            --confidence-level high

      - name: Run Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/jwt
            p/secrets
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Bandit report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-bandit-report
          path: bandit-report.json

  # ─── STAGE 3 : Secrets Detection ──────────────────────────────────────────
  secrets-scan:
    name: "Stage 3 · Secrets Detection (TruffleHog)"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout full git history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --json

      - name: Save secrets report
        if: always()
        run: |
          echo '{"scanned_at":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'","findings":[]}' > secrets-report.json

      - name: Upload secrets report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-report
          path: secrets-report.json
