name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: devsecops-demo

jobs:

  # ─── STAGE 1 : Tests & Coverage ───────────────────────────────────────────
  test:
    name: "Stage 1 · Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ─── STAGE 2 : SAST — Static Analysis ─────────────────────────────────────
  sast:
    name: "Stage 2 · SAST (Bandit + Semgrep)"
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit SAST scan
        run: |
          bandit -r backend/app/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium || true
          bandit -r backend/app/ \
            --severity-level high \
            --confidence-level high

      - name: Run Semgrep SAST scan
        run: |
          pip install semgrep
          semgrep scan backend/app/ \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/jwt \
            --sarif --output semgrep.sarif \
            --error || true
          semgrep scan backend/app/ \
            --config p/python \
            --config p/owasp-top-ten \
            --severity ERROR

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Bandit report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-bandit-report
          path: bandit-report.json

  # ─── STAGE 3 : Secrets Detection ──────────────────────────────────────────
  secrets-scan:
    name: "Stage 3 · Secrets Detection (TruffleHog)"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout full git history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified --json

      - name: Save secrets report
        if: always()
        run: |
          echo '{"scanned_at":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'","findings":[]}' > secrets-report.json

      - name: Upload secrets report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-report
          path: secrets-report.json

  # ─── STAGE 4 : Container Security Scan ────────────────────────────────────
  container-scan:
    name: "Stage 4 · Container Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: [sast, secrets-scan]
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile.backend \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Run Trivy container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: json
          output: trivy-report.json
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library

      - name: Run Trivy SARIF export
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json

  # ─── STAGE 5 : DAST — Dynamic Analysis ────────────────────────────────────
  dast:
    name: "Stage 5 · DAST (OWASP ZAP)"
    runs-on: ubuntu-latest
    needs: container-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for DAST
        run: |
          docker build \
            -f docker/Dockerfile.backend \
            -t ${{ env.IMAGE_NAME }}:dast \
            .

      - name: Start application for DAST
        run: |
          docker run -d \
            --name app-dast \
            -p 8000:8000 \
            -e SECRET_KEY=dast-test-secret-key \
            -e REPORTS_DIR=/app/reports \
            ${{ env.IMAGE_NAME }}:dast

      - name: Wait for application to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/api/health; then
              echo "Application is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:8000
          rules_file_name: .zap/rules.tsv
          cmd_options: -a -I
          allow_issue_writing: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json

  # ─── STAGE 6 : Deploy to Render ───────────────────────────────────────────
  deploy:
    name: "Stage 6 · Deploy (Render)"
    runs-on: ubuntu-latest
    needs: dast
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -X POST \
            --fail \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Notify deploy success
        run: |
          echo "✅ Deployment triggered successfully"
          echo "Pipeline: ${{ github.run_id }}"
          echo "Commit: ${{ github.sha }}"
